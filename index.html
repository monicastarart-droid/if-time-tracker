function InvoicesView({data,updateData}){
const[showCreate,setShowCreate]=useState(false);
const[selectedClient,setSelectedClient]=useState(””);
const[viewInvoice,setViewInvoice]=useState(null);
const[addedServices,setAddedServices]=useState([]);
const[showRecurring,setShowRecurring]=useState(false);
const[recurringTab,setRecurringTab]=useState(“list”); // list | new
const[rClientId,setRClientId]=useState(””);
const[rAmount,setRAmount]=useState(””);
const[rDescription,setRDescription]=useState(””);
const[rDay,setRDay]=useState(“1”);
const allServices=[…FLAT_RATE_SERVICES,…(data.customServices||[])];

const currentMonth=new Date().toISOString().slice(0,7);
const currentMonthLabel=new Date().toLocaleDateString(“en-US”,{month:“long”,year:“numeric”});

// Check which recurring invoices are ready (not yet generated this month)
const recurringList=data.recurringInvoices||[];
const readyToGenerate=recurringList.filter(r=>r.active&&r.lastGenerated!==currentMonth);

const addRecurring=()=>{
if(!rClientId||!rAmount||!rDescription)return;
const rec={id:Date.now().toString(),clientId:rClientId,amount:parseFloat(rAmount)||0,description:rDescription,dayOfMonth:parseInt(rDay)||1,active:true,lastGenerated:null};
updateData(prev=>({recurringInvoices:[…(prev.recurringInvoices||[]),rec]}));
setRClientId(””);setRAmount(””);setRDescription(””);setRDay(“1”);setRecurringTab(“list”);
};

const toggleRecurring=id=>{
updateData(prev=>({recurringInvoices:(prev.recurringInvoices||[]).map(r=>r.id===id?{…r,active:!r.active}:r)}));
};

const deleteRecurring=id=>{
if(window.confirm(“Remove this recurring invoice?”))
updateData(prev=>({recurringInvoices:(prev.recurringInvoices||[]).filter(r=>r.id!==id)}));
};

const generateAll=()=>{
const newInvoices=readyToGenerate.map(r=>{
const client=data.clients.find(c=>c.id===r.clientId);
return{
id:Date.now().toString()+r.id,
invoiceNumber:“INV-”+String((data.invoices||[]).length+readyToGenerate.indexOf(r)+1).padStart(4,“0”),
clientId:r.clientId,
date:today(),
entries:[],expenses:[],services:[],
recurringDescription:r.description,
total:r.amount,
status:“unpaid”,
isRecurring:true,
};
});
updateData(prev=>({
invoices:[…newInvoices,…(prev.invoices||[])],
recurringInvoices:(prev.recurringInvoices||[]).map(r=>readyToGenerate.find(rg=>rg.id===r.id)?{…r,lastGenerated:currentMonth}:r),
}));
setShowRecurring(false);
};

const generateOne=r=>{
const inv={
id:Date.now().toString(),
invoiceNumber:“INV-”+String((data.invoices||[]).length+1).padStart(4,“0”),
clientId:r.clientId,
date:today(),
entries:[],expenses:[],services:[],
recurringDescription:r.description,
total:r.amount,
status:“unpaid”,
isRecurring:true,
};
updateData(prev=>({
invoices:[inv,…(prev.invoices||[])],
recurringInvoices:(prev.recurringInvoices||[]).map(ri=>ri.id===r.id?{…ri,lastGenerated:currentMonth}:ri),
}));
};

const unbilledByClient=data.clients.map(c=>{
const entries=(data.entries||[]).filter(e=>e.clientId===c.id&&!e.billed);
const total=entries.reduce((s,e)=>s+(e.duration/60)*e.rate,0);
return{client:c,entries,expenses:[],total};
});

const sel=unbilledByClient.find(x=>x.client.id===selectedClient);
const serviceTotal=addedServices.reduce((s,sv)=>s+sv.amount,0);
const entryTotal=sel?.entries.reduce((s,e)=>s+(e.duration/60)*e.rate,0)||0;
const grandTotal=entryTotal+serviceTotal;

const toggleService=sv=>setAddedServices(prev=>prev.find(s=>s.id===sv.id)?prev.filter(s=>s.id!==sv.id):[…prev,sv]);

const createInvoice=()=>{
if(!selectedClient||grandTotal===0)return;
const inv={id:Date.now().toString(),invoiceNumber:“INV-”+String((data.invoices||[]).length+1).padStart(4,“0”),clientId:selectedClient,date:today(),entries:sel?.entries||[],expenses:sel?.expenses||[],services:addedServices,total:grandTotal,status:“unpaid”};
updateData(prev=>({
invoices:[inv,…(prev.invoices||[])],
entries:prev.entries.map(e=>(sel?.entries||[]).find(ce=>ce.id===e.id)?{…e,billed:true}:e),
expenses:(prev.expenses||[]).map(e=>(sel?.expenses||[]).find(ce=>ce.id===e.id)?{…e,billed:true}:e),
}));
setShowCreate(false);setSelectedClient(””);setAddedServices([]);setViewInvoice(inv);
};

const printInvoice=inv=>{
const client=data.clients.find(c=>c.id===inv.clientId);
const biz=data.businessName||“Empowerment Services”;
const eRows=(inv.isRecurring&&inv.recurringDescription?
“<tr><td>”+inv.recurringDescription+”</td><td>”+formatDate(inv.date)+”</td><td>Monthly</td><td>”+formatCurrency(inv.total)+”</td></tr>”
:inv.entries.map(e=>”<tr><td>”+e.task+”</td><td>”+formatDate(e.date)+”</td><td>”+formatDuration(e.duration)+”</td><td>”+formatCurrency((e.duration/60)*e.rate)+”</td></tr>”).join(””));
const xRows=(inv.expenses||[]).map(e=>”<tr><td>”+e.description+(e.category?” (”+e.category+”)”:””)+”</td><td>”+formatDate(e.date)+”</td><td>Expense</td><td>”+formatCurrency(e.amount)+”</td></tr>”).join(””);
const sRows=(inv.services||[]).map(s=>”<tr><td>”+s.name+”</td><td>Flat Rate</td><td>—</td><td>”+formatCurrency(s.amount)+”</td></tr>”).join(””);
const logoHtml=data.logo?”<img src='"+data.logo+"' style='max-height:60px;max-width:160px;object-fit:contain;margin-bottom:8px;display:block;'/>”  :””;
const html=[”<!DOCTYPE html><html><head><title>”+inv.invoiceNumber+”</title>”,
“<style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:Georgia,serif;color:#1a2a1a;padding:48px;max-width:750px;margin:0 auto;}”,
“.header{display:flex;justify-content:space-between;margin-bottom:36px;padding-bottom:24px;border-bottom:2px solid #2d7a5e;}”,
“.biz-name{font-size:20px;font-weight:bold;color:#1a3a2a;margin-bottom:4px;}.biz-detail{font-size:12px;color:#4a6a5a;line-height:1.6;}”,
“.inv-num{font-size:24px;font-weight:bold;color:#2d7a5e;text-align:right;}.inv-date{font-size:12px;color:#4a6a5a;text-align:right;margin-top:4px;}”,
“.bill-to{margin-bottom:28px;}.label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:#7a9888;margin-bottom:4px;}.bill-name{font-size:16px;font-weight:bold;}”,
“table{width:100%;border-collapse:collapse;margin-bottom:24px;}th{text-align:left;padding:10px 12px;background:#f0f8f4;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#4a6a5a;border-bottom:2px solid #2d7a5e;}”,
“th:last-child{text-align:right;}td{padding:10px 12px;border-bottom:1px solid #e0ece6;font-size:13px;}td:last-child{text-align:right;}”,
“.total-row td{background:#f0f8f4;font-weight:bold;font-size:15px;border-bottom:none;}”,
“.status{margin-top:16px;text-align:right;font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:”+(inv.status===“paid”?”#2d7a5e”:”#c8883a”)+”;}</style></head><body>”,
“<div class='header'><div>”+logoHtml+”<div class='biz-name'>”+biz+”</div><div class='biz-detail'>”,
(data.address1?data.address1+”<br>”:””)+(data.address2?data.address2+”<br>”:””)+(data.bizPhone?data.bizPhone+”<br>”:””)+(data.bizEmail?data.bizEmail:””),
“</div></div><div><div class='inv-num'>”+inv.invoiceNumber+”</div><div class='inv-date'>”+formatDate(inv.date)+”</div></div></div>”,
“<div class='bill-to'><div class='label'>Bill To</div><div class='bill-name'>”+(client?.name||””)+”</div>”,
(client?.email?”<div style='font-size:13px;color:#4a6a5a'>”+client.email+”</div>”:””),
(client?.address?”<div style='font-size:13px;color:#4a6a5a'>”+client.address+”</div>”:””),
“</div>”,
“<table><thead><tr><th>Description</th><th>Date</th><th>Hours</th><th>Amount</th></tr></thead>”,
“<tbody>”+eRows+xRows+sRows+”<tr class='total-row'><td colspan='3'>Total Due</td><td>”+formatCurrency(inv.total)+”</td></tr></tbody></table>”,
“<div class='status'>”+(inv.status===“paid”?“✓ Paid”:“Payment Due Upon Receipt”)+”</div></body></html>”
].join(””);
const win=window.open(””,”_blank”);win.document.write(html);win.document.close();win.focus();setTimeout(()=>win.print(),500);
};

{data.customTasks&&<button className=“btn-secondary” style={{fontSize:12}} onClick={()=>setConfirmReset(true)}>Reset to Defaults</button>}
</div>
{confirmReset&&(
<div className=“card” style={{borderColor:”#7a3030”,marginBottom:16}}>
<div style={{fontSize:13,color:”#e8c8c8”,marginBottom:10}}>Reset to original 49 IF tasks? All edits will be lost.</div>
<div style={{display:“flex”,gap:8}}><button className=“btn-danger” onClick={()=>{updateData(()=>({customTasks:null}));setConfirmReset(false);}}>Yes, Reset</button><button className=“btn-secondary” onClick={()=>setConfirmReset(false)}>Cancel</button></div>
</div>
)}
<div className=“card” style={{marginBottom:16,borderColor:”#2d5a3e”}}>
<div className="field-label" style={{marginBottom:8}}>Add New Task</div>
<div style={{display:“flex”,gap:8}}>
<input className=“field-input” value={newTask} onChange={e=>setNewTask(e.target.value)} onKeyDown={e=>e.key===“Enter”&&newTask.trim()&&(save([…tasks,newTask.trim()]),setNewTask(””))} placeholder=“Task name…”/>
<button className=“btn-primary” style={{whiteSpace:“nowrap”}} onClick={()=>{if(newTask.trim()){save([…tasks,newTask.trim()]);setNewTask(””);}}} disabled={!newTask.trim()}>+ Add</button>
</div>
</div>
<input className=“field-input” value={search} onChange={e=>setSearch(e.target.value)} placeholder=“Search tasks…” style={{marginBottom:12}}/>
<div className=“card” style={{padding:0,overflow:“hidden”}}>
{filtered.length===0?<div style={{padding:24,textAlign:“center”,color:”#4a7060”}}>No tasks match.</div>
:filtered.map(({t,i})=>(
<div key={i} style={{borderBottom:“1px solid #1a2d3a”}}>
{editingIdx===i?(
<div style={{display:“flex”,gap:8,padding:“10px 14px”,alignItems:“center”}}>
<input className=“field-input” value={editValue} onChange={e=>setEditValue(e.target.value)} onKeyDown={e=>{if(e.key===“Enter”&&editValue.trim()){save(tasks.map((t2,idx)=>idx===i?editValue.trim():t2));setEditingIdx(null);}if(e.key===“Escape”)setEditingIdx(null);}} autoFocus/>
<button className=“btn-primary” style={{whiteSpace:“nowrap”,fontSize:12,padding:“8px 14px”}} onClick={()=>{if(editValue.trim()){save(tasks.map((t2,idx)=>idx===i?editValue.trim():t2));setEditingIdx(null);}}}>Save</button>
<button className=“btn-secondary” style={{whiteSpace:“nowrap”,fontSize:12,padding:“8px 14px”}} onClick={()=>setEditingIdx(null)}>Cancel</button>
</div>
):(
<div style={{display:“flex”,alignItems:“center”,padding:“11px 14px”,gap:10}}>
<div style={{flex:1,fontSize:13,color:”#e8e0d4”}}>{t}</div>
<button className=“btn-secondary” style={{fontSize:11,padding:“4px 10px”,flexShrink:0}} onClick={()=>{setEditingIdx(i);setEditValue(t);}}>Edit</button>
<button className=“btn-danger” style={{fontSize:11,padding:“4px 8px”,flexShrink:0}} onClick={()=>save(tasks.filter((_,idx)=>idx!==i))}>✕</button>
</div>
)}
</div>
))}
</div>
</div>
);
}

function SettingsView({data,updateData}){
const[rate,setRate]=useState(data.hourlyRate);
const[businessName,setBusinessName]=useState(data.businessName||“Empowerment Services”);
const[address1,setAddress1]=useState(data.address1||””);
const[address2,setAddress2]=useState(data.address2||””);
const[bizPhone,setBizPhone]=useState(data.bizPhone||””);
const[bizEmail,setBizEmail]=useState(data.bizEmail||””);
const[logo,setLogo]=useState(data.logo||””);
const[saved,setSaved]=useState(false);
const handleLogo=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setLogo(ev.target.result);r.readAsDataURL(f);};
const save=()=>{updateData(()=>({hourlyRate:parseFloat(rate)||75,businessName,address1,address2,bizPhone,bizEmail,logo}));setSaved(true);setTimeout(()=>setSaved(false),2000);};
return(
<div>
<div style={{fontSize:22,fontWeight:“bold”,color:”#c8f0dc”,marginBottom:20}}>Settings</div>
<div className="card">
<div style={{fontSize:14,fontWeight:“bold”,color:”#c8f0dc”,marginBottom:14}}>Business Information</div>
<div style={{display:“grid”,gap:14}}>
<div>
<div className="field-label">Business Logo</div>
<div style={{display:“flex”,alignItems:“center”,gap:14,marginTop:6}}>
{logo?<img src={logo} alt=“Logo” style={{height:56,maxWidth:160,objectFit:“contain”,borderRadius:6,background:”#1e3040”,padding:4}}/>:<div style={{width:80,height:56,background:”#1e3040”,border:“1px dashed #2d4a5e”,borderRadius:6,display:“flex”,alignItems:“center”,justifyContent:“center”,color:”#4a7060”,fontSize:11}}>No logo</div>}
<div>
<label style={{cursor:“pointer”}}><span className=“btn-secondary” style={{display:“inline-block”,fontSize:12}}>Upload Logo</span><input type=“file” accept=“image/*” onChange={handleLogo} style={{display:“none”}}/></label>
{logo&&<button className=“btn-danger” style={{marginLeft:8,fontSize:11}} onClick={()=>setLogo(””)}>Remove</button>}
</div>
</div>
</div>
<div><div className="field-label">Business Name</div><input className=“field-input” value={businessName} onChange={e=>setBusinessName(e.target.value)}/></div>
<div><div className="field-label">Address Line 1</div><input className=“field-input” value={address1} onChange={e=>setAddress1(e.target.value)} placeholder=“Street address”/></div>
<div><div className="field-label">Address Line 2 (City, State, ZIP)</div><input className=“field-input” value={address2} onChange={e=>setAddress2(e.target.value)} placeholder=“Arcata, CA 95521”/></div>
<div style={{display:“grid”,gridTemplateColumns:“1fr 1fr”,gap:12}}>
<div><div className="field-label">Phone</div><input className=“field-input” value={bizPhone} onChange={e=>setBizPhone(e.target.value)} placeholder=”(707) 555-0000”/></div>
<div><div className="field-label">Email</div><input className=“field-input” value={bizEmail} onChange={e=>setBizEmail(e.target.value)} placeholder=“Empowermentif@gmail.com”/></div>
</div>
<div><div className="field-label">Default Hourly Rate ($)</div><input className=“field-input” type=“number” value={rate} onChange={e=>setRate(e.target.value)}/></div>
<button className="btn-primary" onClick={save}>{saved?“✓ Saved!”:“Save Settings”}</button>
</div>
</div>
</div>
);
}

ReactDOM.createRoot(document.getElementById(“root”)).render(<App/>);
</script>

</body>
</html>
